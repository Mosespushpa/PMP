<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Personal Music Web App - Manage and play your audio and video collection">
    <meta name="theme-color" content="#1a1a1a">
    <title>Personal Music Player</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/main.css">
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/icon-192.png">
</head>
<body>
    <!-- Main Application Container -->
    <div id="app" class="app">
        <!-- Navigation Sidebar -->
        <aside id="sidebar" class="sidebar">
            <nav class="sidebar-nav">
                <div class="sidebar-header">
                    <h1 class="app-title">Music Player</h1>
                    <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
                        <span class="hamburger-icon"></span>
                    </button>
                </div>
                
                <ul class="nav-menu">
                    <li><a href="#home" class="nav-link active" data-view="home">
                        <span class="nav-icon">🏠</span>
                        <span class="nav-text">Home</span>
                    </a></li>
                    <li><a href="#songs" class="nav-link" data-view="songs">
                        <span class="nav-icon">🎵</span>
                        <span class="nav-text">Songs</span>
                    </a></li>
                    <li><a href="#videos" class="nav-link" data-view="videos">
                        <span class="nav-icon">🎬</span>
                        <span class="nav-text">Videos</span>
                    </a></li>
                    <li><a href="#playlists" class="nav-link" data-view="playlists">
                        <span class="nav-icon">📋</span>
                        <span class="nav-text">Playlists</span>
                    </a></li>
                </ul>
                
                <div class="playlists-section">
                    <h2 class="section-title">Your Playlists</h2>
                    <ul id="playlists-list" class="playlists-list">
                        <!-- Playlists will be dynamically inserted here -->
                    </ul>
                    <button id="create-playlist-btn" class="btn-create-playlist">
                        <span>+ Create Playlist</span>
                    </button>
                </div>
            </nav>
        </aside>
        
        <!-- Main Content Area -->
        <main id="main-content" class="main-content">
            <!-- Top Navigation Bar -->
            <header class="top-bar">
                <button id="sidebar-open-btn" class="sidebar-open-btn" aria-label="Open sidebar">
                    <span class="hamburger-icon"></span>
                </button>
                <div class="search-container">
                    <input 
                        type="search" 
                        id="search-input" 
                        class="search-input" 
                        placeholder="Search songs, videos, artists..."
                        aria-label="Search media library"
                    >
                </div>
                
                <div class="top-bar-actions">
                    <button id="upload-btn" class="btn-upload" aria-label="Upload media">
                        <span>📤 Upload</span>
                    </button>
                    <button id="settings-btn" class="btn-settings" aria-label="Settings">
                        <span>⚙️</span>
                    </button>
                </div>
            </header>
            
            <!-- Media Type Filter -->
            <div class="media-filter">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="audio">Audio</button>
                <button class="filter-btn" data-filter="video">Video</button>
            </div>
            
            <!-- Content Views -->
            <section id="content-view" class="content-view">
                <!-- Home View -->
                <div id="home-view" class="view active">
                    <h2 class="view-title">Welcome to Your Music Library</h2>
                    <div id="media-grid" class="media-grid">
                        <!-- Media items will be dynamically inserted here -->
                    </div>
                </div>
                
                <!-- Songs View -->
                <div id="songs-view" class="view">
                    <h2 class="view-title">Songs</h2>
                    <div id="songs-grid" class="media-grid">
                        <!-- Audio items will be dynamically inserted here -->
                    </div>
                </div>
                
                <!-- Videos View -->
                <div id="videos-view" class="view">
                    <h2 class="view-title">Videos</h2>
                    <div id="videos-grid" class="media-grid">
                        <!-- Video items will be dynamically inserted here -->
                    </div>
                </div>
                
                <!-- Playlists View -->
                <div id="playlists-view" class="view">
                    <h2 class="view-title">Playlists</h2>
                    <div id="playlists-grid" class="playlists-grid">
                        <!-- Playlist items will be dynamically inserted here -->
                    </div>
                </div>
                
                <!-- Empty State -->
                <div id="empty-state" class="empty-state hidden">
                    <p class="empty-message">No items found</p>
                    <button class="btn-primary">Upload Media</button>
                </div>
            </section>
        </main>
        
        <!-- Bottom Player Bar -->
        <div id="media-player-container" class="media-player-container"></div>
        <footer id="player-bar" class="player-bar hidden">
            <div class="player-info">
                <img id="player-poster" class="player-poster" src="" alt="Now playing">
                <div class="player-metadata">
                    <div id="player-title" class="player-title">No track selected</div>
                    <div id="player-artist" class="player-artist">Unknown Artist</div>
                </div>
            </div>
            
            <div class="player-controls">
                <button id="btn-previous" class="control-btn" aria-label="Previous track">
                    <span>⏮️</span>
                </button>
                <button id="btn-play-pause" class="control-btn control-btn-primary" aria-label="Play/Pause">
                    <span id="play-pause-icon">▶️</span>
                </button>
                <button id="btn-next" class="control-btn" aria-label="Next track">
                    <span>⏭️</span>
                </button>
            </div>
            
            <div class="player-progress">
                <span id="current-time" class="time-display">0:00</span>
                <input 
                    type="range" 
                    id="progress-bar" 
                    class="progress-bar" 
                    min="0" 
                    max="100" 
                    value="0"
                    aria-label="Seek"
                >
                <span id="duration" class="time-display">0:00</span>
            </div>
            
            <div class="player-volume">
                <button id="btn-volume" class="control-btn" aria-label="Mute/Unmute">
                    <span id="volume-icon">🔊</span>
                </button>
                <input 
                    type="range" 
                    id="volume-bar" 
                    class="volume-bar" 
                    min="0" 
                    max="100" 
                    value="70"
                    aria-label="Volume"
                >
            </div>
            
            <div class="player-options">
                <button id="btn-shuffle" class="control-btn" aria-label="Shuffle" title="Shuffle">
                    <span>🔀</span>
                </button>
                <button id="btn-repeat" class="control-btn" aria-label="Repeat" title="Repeat off">
                    <span id="repeat-icon">🔁</span>
                </button>
                <button id="btn-queue" class="control-btn" aria-label="Queue" title="Show queue">
                    <span>📜</span>
                </button>
            </div>
        </footer>
    </div>
    
    <!-- Hidden Audio/Video Element for Playback -->
    <audio id="media-player" preload="metadata"></audio>
    
    <!-- Modals and Dialogs (will be dynamically created) -->
    <div id="modal-container"></div>
    
    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/library.js"></script>
    <script src="js/playlist.js"></script>
    <script src="js/player.js"></script>
    <script src="js/queue.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/pwa-manager.js"></script>
    <script src="./preloader.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
