<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Manager Verification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }
        .result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .pass { background: #d4edda; color: #155724; }
        .fail { background: #f8d7da; color: #721c24; }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Library Manager Verification</h1>
    <div id="results"></div>
    
    <script src="../js/utils.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/library.js"></script>
    
    <script>
        const resultsDiv = document.getElementById('results');
        
        function log(message, isPass = true) {
            const div = document.createElement('div');
            div.className = `result ${isPass ? 'pass' : 'fail'}`;
            div.textContent = message;
            resultsDiv.appendChild(div);
        }
        
        function logObject(obj) {
            const pre = document.createElement('pre');
            pre.textContent = JSON.stringify(obj, null, 2);
            resultsDiv.appendChild(pre);
        }
        
        async function runVerification() {
            try {
                log('✓ LibraryManager loaded successfully');
                
                // Check that all methods exist
                const methods = [
                    'validateMediaFile',
                    'validatePosterFile',
                    'extractMetadata',
                    'validateMetadata',
                    'addMediaFile',
                    'addMediaBatch',
                    'updateMediaItem',
                    'deleteMediaItem',
                    'updatePoster',
                    'generateDefaultPoster',
                    'getAllMedia',
                    'getMediaByType',
                    'searchMedia'
                ];
                
                for (const method of methods) {
                    if (typeof LibraryManager[method] === 'function') {
                        log(`✓ Method ${method} exists`);
                    } else {
                        log(`✗ Method ${method} is missing`, false);
                    }
                }
                
                // Check constants
                log(`✓ MAX_FILE_SIZE: ${LibraryManager.MAX_FILE_SIZE / (1024 * 1024)} MB`);
                log(`✓ MAX_POSTER_SIZE: ${LibraryManager.MAX_POSTER_SIZE / (1024 * 1024)} MB`);
                log(`✓ MAX_POSTER_DIMENSION: ${LibraryManager.MAX_POSTER_DIMENSION}px`);
                log(`✓ MAX_TITLE_LENGTH: ${LibraryManager.MAX_TITLE_LENGTH} chars`);
                log(`✓ MAX_ARTIST_LENGTH: ${LibraryManager.MAX_ARTIST_LENGTH} chars`);
                log(`✓ MAX_BATCH_SIZE: ${LibraryManager.MAX_BATCH_SIZE} files`);
                
                // Test metadata validation
                const validMetadata = LibraryManager.validateMetadata('Test Song', 'Test Artist');
                log(`✓ Valid metadata validation: ${validMetadata.valid}`);
                
                const invalidMetadata = LibraryManager.validateMetadata('x'.repeat(201), 'Test Artist');
                log(`✓ Invalid metadata validation: ${!invalidMetadata.valid}`);
                
                // Test file validation with mock file
                const mockFile = new File(['test'], 'test.mp3', { type: 'audio/mpeg' });
                const fileValidation = await LibraryManager.validateMediaFile(mockFile);
                log(`✓ File validation executed: ${fileValidation !== undefined}`);
                
                // Test search with empty library
                await StorageManager.initDB();
                const searchResults = await LibraryManager.searchMedia('test');
                log(`✓ Search executed: returned ${searchResults.length} results`);
                
                log('✓ All basic verifications passed!');
                
            } catch (error) {
                log(`✗ Error: ${error.message}`, false);
                console.error(error);
            }
        }
        
        runVerification();
    </script>
</body>
</html>
